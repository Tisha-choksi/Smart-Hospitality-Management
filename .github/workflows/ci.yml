name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ==========================================
  # FRONTEND LINTING
  # ==========================================
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Run ESLint
        working-directory: frontend
        run: npm run lint
      
      - name: Check formatting
        working-directory: frontend
        run: npm run format:check || true

  # ==========================================
  # BACKEND LINTING & TESTING
  # ==========================================
  lint-backend:
    name: Lint & Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'
      
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      
      - name: Run ESLint
        working-directory: backend
        run: npm run lint
      
      - name: Run tests
        working-directory: backend
        run: npm run test
        env:
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'

  # ==========================================
  # AI SERVICES LINTING & TESTING
  # ==========================================
  lint-ai:
    name: Lint & Test AI Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'ai-services/requirements.txt'
      
      - name: Install dependencies
        working-directory: ai-services
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Ruff linter
        working-directory: ai-services
        run: ruff check .
      
      - name: Run Pytest
        working-directory: ai-services
        run: pytest --cov=app tests/

  # ==========================================
  # BUILD CHECK
  # ==========================================
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend, lint-ai]
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install root dependencies
        run: npm ci
      
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      
      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npm run build
      
      - name: Python build check (AI Services)
        working-directory: ai-services
        run: |
          pip install -r requirements.txt
          python -m py_compile app/main.py