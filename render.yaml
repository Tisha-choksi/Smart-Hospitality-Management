services:
  # Main Centralized API Service
  - type: web
    name: smart-hospitality-api
    env: docker
    plan: free
    region: ohio
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: hospitality-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 7d
      - key: GROQ_API_KEY
        sync: false # Set manually in Render dashboard
      - key: GOOGLE_API_KEY
        sync: false # Set manually in Render dashboard
      - key: STRIPE_SECRET_KEY
        sync: false # Set manually in Render dashboard
      - key: EMAIL_USER
        sync: false # Optional: set manually for email notifications
      - key: EMAIL_PASS
        sync: false # Optional: set manually for email notifications
      - key: NODE_ENV
        value: production

databases:
  - name: hospitality-db
    plan: free
    region: ohio
    databaseName: hospitality
    user: postgres
